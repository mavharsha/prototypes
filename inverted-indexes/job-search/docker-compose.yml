version: '3.8'

services:
  # Job Search Service with embedded Lucene
  job-search:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: job-search-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - LUCENE_INDEX_PATH=/app/data/index
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0
    volumes:
      # Persist Lucene index data
      - lucene-data:/app/data/index
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/index/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - job-search-network

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: job-search-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      job-search:
        condition: service_healthy
    networks:
      - job-search-network
    profiles:
      - production

volumes:
  lucene-data:
    driver: local

networks:
  job-search-network:
    driver: bridge
