services:
  api-1:
    build: .
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - app-network

  api-2:
    build: .
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - app-network

  api-3:
    build: .
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - app-network

  api-4:
    build: .
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-1
      - api-2
      - api-3
      - api-4
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
